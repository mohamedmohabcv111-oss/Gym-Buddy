<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PyScript Test</title>

<link rel="stylesheet" href="./pagedesign.css">

<link rel="stylesheet" href="https://pyscript.net/releases/2024.10.1/core.css">
<script type="module" src="https://pyscript.net/releases/2024.10.1/core.js"></script>
<script src="https://kit.fontawesome.com/b9a020078f.js" crossorigin="anonymous"></script>



<py-config>
    packages = ["pyodide-http"] 
    [[fetch]]
    files = ["./Knowledge_Base.py", "./Engine.py"]
</py-config>

</head>



<body>
   
<script type="py" src="./Engine.py"></script>


<button id="chatbot" type="button"><i class="fa-solid fa-hippo"></i></button>

<div id="chatbot-overlay"></div>

<div id="chatbot-card">

  <h2 class="primary" style="margin-bottom: 0;">Gym Buddy AI</h2>

  <div id="chat-messages">
    <div class="msg ai">
      <div class="bubble">Hey! Tell me what you've been feeling lately</div>
    </div>
  </div>

  <div class="chat-input-area">
    <textarea id="chat-input" placeholder="Describe what you're feeling..." rows="1"></textarea>
    <button class="send-btn" id="send-btn">
      <i class="fa-solid fa-paper-plane"></i>
    </button>
  </div>

</div>

<h1 class = "primary">Welcome To Your Virtual Gym Buddy</h1>
    <div id="first_section" class = "program-card">

        <div id="Question"></div>


        <div class="button-group">
            
            <div id ="counter">Remaining Questions: <span id="count"></span></div>

            <button id="yes-btn" class="primary-btn">Yes</button>
            <button id="no-btn" class="primary-btn">No</button>
        </div>

        <hr>

        <h2 id = "Output" class="secondary">Output</h2>
        <div id="Output"></div>

    </div>



    <h1 class = "primary" >Gym Buddy help</h1>

    <div id="second_section" class = "program-card">
        

    <div class = "program-subcard" id = "Solution">
        <h2 id="solution-header" class="secondary">Best Solution To Your Problem</h2>
            <hr>
        
        <div id="Answer_Solution"></div>
         
    </div>




    



<div class = "program-subcard">

        <h2 id="vitamin-header" class="secondary">Vitamin Plan Just For You</h2>
            <hr>


            <div id="Vitamin_suggestion"></div>


            <template id="vitamin-row-template">

                <div class="vitamin-row">

                    <img id="vitamin-image" src="" alt="Vitamin image">

                    <div class="vitamin-text">

                        <h3 id="vitamin-name"></h3>
                        <p id="vitamin-output"></p>

                    </div>
                    
                </div>


            </template>



    </div>  



    </div>

   <script>
  const chatbotBtn     = document.getElementById('chatbot');
  const chatbotCard    = document.getElementById('chatbot-card');
  const chatbotOverlay = document.getElementById('chatbot-overlay');
  const chatMessages   = document.getElementById('chat-messages');
  const chatInput      = document.getElementById('chat-input');
  const sendBtn        = document.getElementById('send-btn');

  function toggleChatbot() {
    chatbotCard.classList.toggle('active');
    chatbotOverlay.classList.toggle('active');
  }

  chatbotBtn.addEventListener('click', toggleChatbot);
  chatbotOverlay.addEventListener('click', toggleChatbot);

  function appendMessage(text, sender) {
    const msgDiv = document.createElement('div');
    msgDiv.classList.add('msg', sender);
    
    const bubble = document.createElement('div');
    bubble.classList.add('bubble');
    bubble.style.whiteSpace = 'pre-wrap';
    bubble.textContent = text;
    
    msgDiv.appendChild(bubble);
    chatMessages.appendChild(msgDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  async function sendMessage() {
    const text = chatInput.value.trim();
    if (!text) return;

    appendMessage(text, 'user');
    chatInput.value = '';

    const loadingId = 'loading-' + Date.now();
    const msgDiv = document.createElement('div');
    msgDiv.classList.add('msg', 'ai');
    msgDiv.id = loadingId;
    const bubble = document.createElement('div');
    bubble.classList.add('bubble');
    bubble.textContent = 'Thinking...';
    msgDiv.appendChild(bubble);
    chatMessages.appendChild(msgDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ message: text })
      });
      
      const rawText = await response.text();
      const loadingEl = document.getElementById(loadingId);
      if (loadingEl) loadingEl.remove();

      let data;
      try {
        data = JSON.parse(rawText);
      } catch (e) {
        console.error("Non-JSON response from server:", rawText);
        appendMessage('Backend Error: Server returned HTML or crashed. Check terminal!', 'ai');
        return;
      }

      if (response.ok && data.reply) {
        appendMessage(data.reply, 'ai');
      } else {
        appendMessage(data.error || 'Sorry, I encountered an error.', 'ai');
      }
    } catch (error) {
      const loadingEl = document.getElementById(loadingId);
      if (loadingEl) loadingEl.remove();
      appendMessage('Connection error. Open Browser Console (F12) to see details.', 'ai');
      console.error('Chat error:', error);
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>


</body>
</html>
